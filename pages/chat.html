<!doctype html>
<html lang="en" class="chat-page">

<head>
	<meta charset="utf-8" />
	<title>parascene</title>
	<meta name="viewport"
		content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
	<meta name="theme-color" content="#242131" />
	<meta name="description" content="Chat in Parascene Connect: direct messages, servers, and channels." />
	<link rel="stylesheet" href="/pages/chat.css{{V}}" />
	<script>
		(function () {
			var root = document.documentElement;
			if (!root) return;
			function shouldUseAppMobileHeader(pathname) {
				var p = String(pathname || '').replace(/\/+$/, '') || '/';
				if (p === '/' || p === '/index.html' || p === '/feed' || p === '/explore' || p === '/creations') return true;
				if (!p.startsWith('/chat/c/')) return false;
				var slug = p.slice('/chat/c/'.length).split('/')[0] || '';
				slug = String(slug).toLowerCase().trim();
				if (!slug || slug === 'feedback') return false;
				return slug === 'feed' || slug === 'explore' || slug === 'creations';
			}
			function shouldUseChannelsSidebar(pathname, hash) {
				var p = String(pathname || '').replace(/\/+$/, '') || '/';
				var h = String(hash || '').trim().toLowerCase();
				return p === '/chat' && h === '#channels';
			}
			try {
				if (
					window.matchMedia('(max-width: 768px)').matches &&
					(
						shouldUseAppMobileHeader(window.location.pathname) ||
						shouldUseChannelsSidebar(window.location.pathname, window.location.hash)
					)
				) {
					root.classList.add('chat-page--use-app-mobile-header');
				}
			} catch (e) { }
			function clamp(n, min, max) {
				var x = Number(n);
				if (!isFinite(x)) return null;
				x = Math.round(x);
				if (x < min) x = min;
				if (x > max) x = max;
				return x;
			}
			try {
				var sidebarRaw = window.localStorage.getItem('prsn-chat-sidebar-width-px');
				var sidebar = clamp(sidebarRaw, 220, 460);
				if (sidebar != null) {
					root.style.setProperty('--chat-sidebar-width', sidebar + 'px');
				}
			} catch (e) { }
			try {
				var canvasRaw = window.localStorage.getItem('prsn-chat-canvas-width-px');
				var canvas = clamp(canvasRaw, 260, 720);
				if (canvas != null) {
					root.style.setProperty('--chat-canvas-panel-width', canvas + 'px');
				}
			} catch (e) { }
		})();
	</script>
</head>

	<script>
		(function () {
			var shell = document.getElementById('chatShell');
			var root = document.querySelector('[data-chat-page]');
			if (!shell || !root) return;

			var messagesEl = root.querySelector('[data-chat-messages]');
			var inputEl = root.querySelector('[data-chat-body-input]');

			var chatViewportCleanup = null;
			var chatViewportRetryTimeouts = [];

			function isNearBottom(el, threshold) {
				var t = threshold != null ? threshold : 24;
				return el.scrollHeight - el.scrollTop - el.clientHeight <= t;
			}

			function syncToVisualViewport() {
				var vv = window.visualViewport;
				if (!vv) {
					shell.style.top = '0px';
					shell.style.left = '0px';
					shell.style.width = '100%';
					shell.style.height = window.innerHeight + 'px';
					return;
				}
				shell.style.top = vv.offsetTop + 'px';
				shell.style.left = vv.offsetLeft + 'px';
				shell.style.width = vv.width + 'px';
				shell.style.height = vv.height + 'px';
			}

			function onViewportChange() {
				var shouldStick = messagesEl && isNearBottom(messagesEl, 64);
				syncToVisualViewport();
				if (shouldStick && messagesEl) {
					requestAnimationFrame(function () {
						messagesEl.scrollTop = messagesEl.scrollHeight;
					});
				}
			}

			function clearChatViewportRetryTimeouts() {
				for (var i = 0; i < chatViewportRetryTimeouts.length; i++) {
					clearTimeout(chatViewportRetryTimeouts[i]);
				}
				chatViewportRetryTimeouts = [];
			}

			function scheduleChatViewportHeightRetries() {
				clearChatViewportRetryTimeouts();
				var delays = [0, 50, 120, 220, 400];
				for (var d = 0; d < delays.length; d++) {
					(function (ms) {
						var id = setTimeout(function () {
							onViewportChange();
						}, ms);
						chatViewportRetryTimeouts.push(id);
					})(delays[d]);
				}
			}

			function setupChatViewportSync() {
				if (typeof chatViewportCleanup === 'function') {
					chatViewportCleanup();
					chatViewportCleanup = null;
				}
				var onComposerFocusViewport = function (ev) {
					if (!(inputEl instanceof HTMLElement) || ev.target !== inputEl) return;
					scheduleChatViewportHeightRetries();
				};
				if (window.visualViewport) {
					window.visualViewport.addEventListener('resize', onViewportChange);
					window.visualViewport.addEventListener('scroll', onViewportChange);
				}
				window.addEventListener('resize', onViewportChange);
				window.addEventListener('orientationchange', onViewportChange);
				root.addEventListener('focusin', onComposerFocusViewport);
				root.addEventListener('focusout', onComposerFocusViewport);
				if (inputEl instanceof HTMLElement) {
					inputEl.addEventListener('focus', onViewportChange);
					inputEl.addEventListener('blur', onViewportChange);
				}
				onViewportChange();
				requestAnimationFrame(function () {
					requestAnimationFrame(function () {
						onViewportChange();
					});
				});
				if (messagesEl) {
					messagesEl.scrollTop = messagesEl.scrollHeight;
				}
				chatViewportCleanup = function () {
					clearChatViewportRetryTimeouts();
					try {
						shell.style.removeProperty('top');
						shell.style.removeProperty('left');
						shell.style.removeProperty('width');
						shell.style.removeProperty('height');
					} catch (e) { }
					if (window.visualViewport) {
						window.visualViewport.removeEventListener('resize', onViewportChange);
						window.visualViewport.removeEventListener('scroll', onViewportChange);
					}
					window.removeEventListener('resize', onViewportChange);
					window.removeEventListener('orientationchange', onViewportChange);
					root.removeEventListener('focusin', onComposerFocusViewport);
					root.removeEventListener('focusout', onComposerFocusViewport);
					if (inputEl instanceof HTMLElement) {
						inputEl.removeEventListener('focus', onViewportChange);
						inputEl.removeEventListener('blur', onViewportChange);
					}
				};
			}

			setupChatViewportSync();
		})();
	</script>
