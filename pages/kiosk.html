<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="color-scheme" content="light dark" />
	<meta name="robots" content="noindex, nofollow" />
	<title>parascene</title>
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<style>
		:root {
			color-scheme: light dark;
			--bg: #f6f7fb;
			--text: #0f172a;
			--surface: #ffffff;
			--border: #e2e8f0;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #0f0d1a;
				--text: #ede9fe;
				--surface: #1a1628;
				--border: #3d3552;
			}
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			background: var(--bg);
			color: var(--text);
			overflow: hidden;
		}

		body {
			min-height: 100vh;
			min-height: 100dvh;
		}

		.kiosk {
			position: relative;
			width: 100%;
			height: 100vh;
			height: 100dvh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}

		.kiosk-stage {
			position: absolute;
			inset: 0;
			background: #000;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.35s ease;
		}

		.kiosk.has-share .kiosk-stage {
			opacity: 1;
			pointer-events: auto;
		}

		.kiosk-layer {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			transition: opacity 1s ease;
			overflow: hidden;
			background: #000;
		}

		.kiosk-layer.is-active {
			opacity: 1;
			z-index: 1;
		}

		.kiosk-layer img,
		.kiosk-layer video {
			display: block;
			width: 100%;
			height: 100%;
			object-fit: contain;
			background: #000;
		}

		.kiosk-layer img.ken-burns {
			will-change: transform;
			animation: kioskKenBurns 14s ease-in-out forwards;
		}

		.kiosk-layer img.ken-burns-alt {
			will-change: transform;
			animation: kioskKenBurnsAlt 14s ease-in-out forwards;
		}

		@keyframes kioskKenBurns {
			from {
				transform: scale(1) translate(0, 0);
			}
			to {
				transform: scale(1.08) translate(-1.5%, -1%);
			}
		}

		@keyframes kioskKenBurnsAlt {
			from {
				transform: scale(1.06) translate(-1%, 0.5%);
			}
			to {
				transform: scale(1) translate(0.5%, -0.5%);
			}
		}

		.kiosk-chrome {
			position: absolute;
			z-index: 2;
			left: 0;
			right: 0;
			bottom: 0;
			display: flex;
			flex-direction: row;
			flex-wrap: nowrap;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			padding: 20px 24px calc(20px + env(safe-area-inset-bottom, 0px));
			pointer-events: none;
		}

		.kiosk.has-share .kiosk-chrome {
			background: linear-gradient(to top, rgba(0, 0, 0, 0.45) 0%, rgba(0, 0, 0, 0) 100%);
		}

		.kiosk-logo {
			display: block;
			line-height: 0;
			opacity: 0.35;
			flex: 0 0 auto;
			margin-left: auto;
		}

		.kiosk-logo svg {
			display: block;
			width: 120px;
			height: auto;
		}

		.kiosk.has-share .kiosk-logo {
			opacity: 0.4;
			filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
		}

		.kiosk-logo .logo-text {
			fill: var(--text);
		}

		.kiosk.has-share .kiosk-logo .logo-text {
			fill: #fff;
		}

		.kiosk-viewers {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: flex-start;
			gap: 10px;
			min-height: 40px;
			min-width: 0;
			flex: 1 1 auto;
		}

		.kiosk-avatar {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			object-fit: cover;
			background: var(--surface);
			border: 2px solid var(--border);
			display: block;
		}

		.kiosk.has-share .kiosk-avatar {
			border-color: rgba(255, 255, 255, 0.35);
		}

		.kiosk-avatar-fallback {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--surface);
			border: 2px solid var(--border);
			font-size: 14px;
			font-weight: 600;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			color: var(--text);
			text-transform: uppercase;
			user-select: none;
		}

		.kiosk.has-share .kiosk-avatar-fallback {
			background: rgba(255, 255, 255, 0.12);
			border-color: rgba(255, 255, 255, 0.35);
			color: #fff;
		}
	</style>
</head>

	<script>
		window.__KIOSK__ = null;
	</script>
	<script>
		(function () {
			var POLL_MS = 15000;
			var IMAGE_DWELL_MS = 12000;
			var CROSSFADE_MS = 1000;
			var VIDEO_MAX_MS = 60000;

			var cfg = window.__KIOSK__ || {};
			var slug = String(cfg.slug || "").trim();
			var token = String(cfg.token || "").trim();
			var shell = document.getElementById("kiosk");
			var stage = document.getElementById("kiosk-stage");
			var layerA = document.getElementById("kiosk-layer-a");
			var layerB = document.getElementById("kiosk-layer-b");
			var viewersRoot = document.getElementById("kiosk-viewers");
			if (!shell || !stage || !layerA || !layerB || !viewersRoot || !slug || !token) return;

			var pollTimer = null;
			var advanceTimer = null;
			var lastViewersKey = "";
			var playlist = [];
			var playlistIds = {};
			var pendingNew = [];
			var shownAt = {};
			var currentId = null;
			var activeIsA = true;
			var transitioning = false;
			var kenToggle = false;

			function apiUrl(path) {
				return "/api/kiosk/" + encodeURIComponent(slug) + "/" + path + "?token=" + encodeURIComponent(token);
			}

			function handleAuth(res) {
				if (res.status === 401) {
					window.location.reload();
					return true;
				}
				return false;
			}

			function initialFor(name) {
				var s = String(name || "").trim();
				return s ? s.charAt(0) : "?";
			}

			function shareKey(share) {
				return share && share.id ? String(share.id) : "";
			}

			function clearAdvanceTimer() {
				if (advanceTimer) {
					clearTimeout(advanceTimer);
					advanceTimer = null;
				}
			}

			function activeLayer() {
				return activeIsA ? layerA : layerB;
			}

			function inactiveLayer() {
				return activeIsA ? layerB : layerA;
			}

			function renderViewers(users) {
				var list = Array.isArray(users) ? users : [];
				var key = list.map(function (u) {
					return String(u.user_id) + ":" + String(u.avatar_url || "") + ":" + String(u.user_name || "");
				}).join("|");
				if (key === lastViewersKey) return;
				lastViewersKey = key;

				viewersRoot.textContent = "";
				for (var i = 0; i < list.length; i++) {
					var u = list[i];
					var label = u.user_name ? "@" + u.user_name : "user";
					if (u.avatar_url) {
						var img = document.createElement("img");
						img.className = "kiosk-avatar";
						img.src = u.avatar_url;
						img.alt = label;
						img.width = 40;
						img.height = 40;
						img.loading = "lazy";
						img.onerror = (function (name) {
							return function () {
								var fb = document.createElement("div");
								fb.className = "kiosk-avatar-fallback";
								fb.textContent = initialFor(name);
								fb.setAttribute("aria-label", label);
								if (this.parentNode) this.parentNode.replaceChild(fb, this);
							};
						})(u.user_name);
						viewersRoot.appendChild(img);
					} else {
						var fb = document.createElement("div");
						fb.className = "kiosk-avatar-fallback";
						fb.textContent = initialFor(u.user_name);
						fb.setAttribute("aria-label", label);
						viewersRoot.appendChild(fb);
					}
				}
			}

			function clearStage() {
				clearAdvanceTimer();
				layerA.textContent = "";
				layerB.textContent = "";
				layerA.classList.remove("is-active");
				layerB.classList.remove("is-active");
				stage.setAttribute("aria-hidden", "true");
				shell.classList.remove("has-share");
				currentId = null;
				transitioning = false;
			}

			function fillLayer(layer, share, onReady) {
				layer.textContent = "";
				var done = false;
				function ready() {
					if (done) return;
					done = true;
					if (typeof onReady === "function") onReady();
				}

				if (share.media_type === "video" && share.video_url) {
					var video = document.createElement("video");
					video.src = share.video_url;
					video.muted = true;
					video.playsInline = true;
					video.setAttribute("playsinline", "");
					video.setAttribute("muted", "");
					video.preload = "auto";
					video.addEventListener("loadeddata", ready, { once: true });
					video.addEventListener("error", ready, { once: true });
					layer.appendChild(video);
					setTimeout(ready, 2500);
					return video;
				}

				if (share.image_url) {
					var img = document.createElement("img");
					img.src = share.image_url;
					img.alt = "";
					img.className = kenToggle ? "ken-burns-alt" : "ken-burns";
					kenToggle = !kenToggle;
					img.addEventListener("load", ready, { once: true });
					img.addEventListener("error", ready, { once: true });
					layer.appendChild(img);
					setTimeout(ready, 2500);
					return img;
				}

				ready();
				return null;
			}

			function scheduleAdvance(share, mediaEl) {
				clearAdvanceTimer();
				if (!share) return;

				if (share.media_type === "video" && mediaEl && mediaEl.tagName === "VIDEO") {
					var advanced = false;
					function go() {
						if (advanced) return;
						advanced = true;
						advance();
					}
					mediaEl.addEventListener("ended", go, { once: true });
					advanceTimer = setTimeout(go, VIDEO_MAX_MS);
					var play = mediaEl.play();
					if (play && typeof play.catch === "function") {
						play.catch(function () {
							advanceTimer = setTimeout(go, IMAGE_DWELL_MS);
						});
					}
					return;
				}

				advanceTimer = setTimeout(function () {
					advance();
				}, IMAGE_DWELL_MS);
			}

			function showShare(share, opts) {
				opts = opts || {};
				if (!share) {
					clearStage();
					return;
				}

				var id = shareKey(share);
				if (!id) return;
				if (!opts.force && id === currentId) return;
				if (transitioning) return;

				var incoming = inactiveLayer();
				var outgoing = activeLayer();
				transitioning = true;

				var mediaEl = fillLayer(incoming, share, function () {
					incoming.classList.add("is-active");
					outgoing.classList.remove("is-active");
					activeIsA = !activeIsA;
					currentId = id;
					shownAt[id] = Date.now();
					stage.setAttribute("aria-hidden", "false");
					shell.classList.add("has-share");

					setTimeout(function () {
						outgoing.textContent = "";
						transitioning = false;
						scheduleAdvance(share, mediaEl);
					}, CROSSFADE_MS);
				});
			}

			function pickNext() {
				if (pendingNew.length) {
					return pendingNew.shift();
				}
				if (!playlist.length) return null;
				if (playlist.length === 1) return playlist[0];

				var candidates = [];
				for (var i = 0; i < playlist.length; i++) {
					var s = playlist[i];
					if (shareKey(s) === currentId) continue;
					candidates.push(s);
				}
				if (!candidates.length) return playlist[0];

				candidates.sort(function (a, b) {
					var ta = shownAt[shareKey(a)] || 0;
					var tb = shownAt[shareKey(b)] || 0;
					return ta - tb;
				});

				var coldCount = Math.max(1, Math.ceil(candidates.length / 2));
				var cold = candidates.slice(0, coldCount);
				return cold[Math.floor(Math.random() * cold.length)];
			}

			function advance() {
				if (transitioning) return;
				var next = pickNext();
				if (!next) {
					if (!playlist.length) clearStage();
					return;
				}
				showShare(next, { force: true });
			}

			function mergePlaylist(shares) {
				var list = Array.isArray(shares) ? shares.filter(function (s) { return s && s.id; }) : [];
				var nextIds = {};
				for (var i = 0; i < list.length; i++) nextIds[list[i].id] = true;

				var newcomers = [];
				for (var j = 0; j < list.length; j++) {
					var item = list[j];
					if (!playlistIds[item.id]) newcomers.push(item);
				}

				playlist = list;
				playlistIds = nextIds;

				// Drop pending items that vanished from the channel.
				pendingNew = pendingNew.filter(function (s) {
					return playlistIds[shareKey(s)];
				});

				// Newest first from API; queue brand-new items for priority play.
				for (var k = newcomers.length - 1; k >= 0; k--) {
					var n = newcomers[k];
					var alreadyQueued = pendingNew.some(function (p) {
						return shareKey(p) === shareKey(n);
					});
					if (!alreadyQueued && shareKey(n) !== currentId) {
						pendingNew.unshift(n);
					}
				}

				if (!playlist.length) {
					clearStage();
					return;
				}

				if (!currentId) {
					var first = pendingNew.length ? pendingNew.shift() : playlist[0];
					showShare(first, { force: true });
					return;
				}

				if (!playlistIds[currentId]) {
					advance();
					return;
				}

				// New arrivals: cut in after current dwell by leaving them in pendingNew.
			}

			function pollViewers() {
				return fetch(apiUrl("viewers"), { credentials: "omit", headers: { Accept: "application/json" } })
					.then(function (res) {
						if (handleAuth(res)) return null;
						if (!res.ok) return null;
						return res.json();
					})
					.then(function (data) {
						if (!data) return;
						renderViewers(data.users);
					})
					.catch(function () {});
			}

			function pollShares() {
				return fetch(apiUrl("shares"), { credentials: "omit", headers: { Accept: "application/json" } })
					.then(function (res) {
						if (handleAuth(res)) return null;
						if (!res.ok) return null;
						return res.json();
					})
					.then(function (data) {
						if (!data) return;
						mergePlaylist(data.shares);
					})
					.catch(function () {});
			}

			function poll() {
				pollViewers();
				pollShares();
			}

			function start() {
				poll();
				if (pollTimer) clearInterval(pollTimer);
				pollTimer = setInterval(poll, POLL_MS);
			}

			document.addEventListener("visibilitychange", function () {
				if (document.visibilityState === "visible") poll();
			});

			start();
		})();
	</script>
</body>

</html>
