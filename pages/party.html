<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#0a0a0f" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="mobile-web-app-capable" content="yes" />
	<title>Party Mode</title>
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<style>
		:root {
			--bg: #0a0a0f;
			--surface: #16161f;
			--surface-raised: #1e1e2a;
			--border: #2a2a38;
			--text: #f2f2f7;
			--muted: #9b9bb0;
			--accent: #7c6cff;
			--accent-fg: #fff;
			--danger: #ff6b6b;
			--ok: #3dd68c;
			--amber: #f5c542;
			--safe-top: env(safe-area-inset-top, 0px);
			--safe-bottom: env(safe-area-inset-bottom, 0px);
			--safe-left: env(safe-area-inset-left, 0px);
			--safe-right: env(safe-area-inset-right, 0px);
			--party-layout-max: 28rem;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
			background: var(--bg);
			color: var(--text);
			font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			-webkit-font-smoothing: antialiased;
		}

		body.party-body {
			display: flex;
			justify-content: center;
		}

		.party-app {
			width: 100%;
			max-width: var(--party-layout-max);
			min-height: 100dvh;
			display: flex;
			flex-direction: column;
			gap: 12px;
			padding:
				calc(12px + var(--safe-top))
				calc(12px + var(--safe-right))
				calc(12px + var(--safe-bottom))
				calc(12px + var(--safe-left));
		}

		.party-header h1 {
			margin: 0;
			font-size: 1.2rem;
			font-weight: 700;
		}

		.party-header p {
			margin: 4px 0 0;
			font-size: 0.8rem;
			color: var(--muted);
			line-height: 1.4;
		}

		.party-badge {
			display: inline-block;
			font-size: 0.6rem;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			padding: 2px 6px;
			border-radius: 4px;
			background: var(--accent);
			color: var(--accent-fg);
			margin-left: 6px;
			vertical-align: middle;
		}

		.party-field {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.party-field label {
			font-size: 0.75rem;
			color: var(--muted);
		}

		.party-select {
			width: 100%;
			padding: 10px 12px;
			border-radius: 6px;
			border: 1px solid var(--border);
			background: var(--surface);
			color: var(--text);
			font: inherit;
		}

		.party-capture {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.party-viewfinder {
			position: relative;
			width: 100%;
			aspect-ratio: 3 / 4;
			border-radius: 10px;
			overflow: hidden;
			background: #000;
			border: 1px solid var(--border);
		}

		.party-viewfinder video,
		.party-viewfinder img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.party-viewfinder-placeholder {
			position: absolute;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 8px;
			padding: 16px;
			text-align: center;
			color: var(--muted);
			font-size: 0.85rem;
			line-height: 1.4;
		}

		.party-viewfinder-placeholder strong {
			color: var(--text);
			font-size: 1rem;
		}

		.party-viewfinder-status {
			position: absolute;
			left: 8px;
			right: 8px;
			top: 8px;
			padding: 5px 8px;
			border-radius: 6px;
			background: rgba(0, 0, 0, 0.55);
			font-size: 0.7rem;
			color: #fff;
			pointer-events: none;
		}

		.party-capture-actions {
			display: grid;
			grid-template-columns: 1fr auto 1fr;
			align-items: center;
			gap: 8px;
		}

		.party-btn {
			padding: 12px 16px;
			border-radius: 6px;
			border: none;
			font: inherit;
			font-weight: 600;
			cursor: pointer;
		}

		.party-btn--primary {
			background: var(--accent);
			color: var(--accent-fg);
		}

		.party-btn--ghost {
			background: transparent;
			color: var(--muted);
			border: 1px solid var(--border);
			flex: none;
			min-width: 0;
		}

		.party-btn--snap {
			grid-column: 1 / -1;
			width: 100%;
			padding: 14px;
			font-size: 1rem;
		}

		.party-btn--shutter {
			width: 72px;
			height: 72px;
			min-width: 72px;
			max-width: 72px;
			padding: 0;
			flex: 0 0 72px;
			aspect-ratio: 1;
			border-radius: 50%;
			border: 4px solid #fff;
			background: rgba(255, 255, 255, 0.2);
			margin: 0 auto;
			justify-self: center;
		}

		.party-btn--shutter:active {
			background: #fff;
		}

		.party-capture-actions--live .party-btn--snap {
			display: none;
		}

		.party-capture-actions--live .party-btn--shutter {
			display: block;
		}

		.party-capture-actions:not(.party-capture-actions--live) .party-btn--shutter {
			display: none;
		}

		.party-section {
			display: flex;
			flex-direction: column;
			gap: 8px;
			min-height: 0;
		}

		.party-section-head {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 8px;
		}

		.party-section-head h2 {
			margin: 0;
			font-size: 0.85rem;
			font-weight: 600;
		}

		.party-section-head span {
			font-size: 0.75rem;
			color: var(--muted);
		}

		.party-queue-scroll {
			display: flex;
			gap: 8px;
			overflow-x: auto;
			padding-bottom: 4px;
			-webkit-overflow-scrolling: touch;
			scroll-snap-type: x proximity;
		}

		.party-queue-empty {
			font-size: 0.8rem;
			color: var(--muted);
			padding: 12px;
			border: 1px dashed var(--border);
			border-radius: 10px;
			text-align: center;
		}

		.party-queue-item {
			position: relative;
			flex: 0 0 72px;
			width: 72px;
			height: 72px;
			padding: 0;
			border: 2px solid transparent;
			border-radius: 8px;
			overflow: hidden;
			background: var(--surface);
			cursor: pointer;
			scroll-snap-align: start;
		}

		.party-queue-item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.party-queue-item[data-status='processing'] {
			border-color: var(--amber);
		}

		.party-queue-item[data-status='ready'] {
			border-color: var(--ok);
		}

		.party-queue-item[data-selected='true'] {
			box-shadow: 0 0 0 2px var(--accent);
		}

		.party-queue-item-badge {
			position: absolute;
			left: 4px;
			right: 4px;
			bottom: 4px;
			padding: 2px 4px;
			border-radius: 4px;
			font-size: 0.55rem;
			font-weight: 700;
			text-transform: uppercase;
			text-align: center;
			background: rgba(0, 0, 0, 0.7);
			color: #fff;
		}

		.party-queue-item[data-status='processing'] .party-queue-item-badge {
			color: var(--amber);
		}

		.party-queue-item[data-status='ready'] .party-queue-item-badge {
			color: var(--ok);
		}

		.party-queue-spinner {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(0, 0, 0, 0.45);
		}

		.party-queue-spinner::after {
			content: '';
			width: 22px;
			height: 22px;
			border: 2px solid rgba(255, 255, 255, 0.25);
			border-top-color: #fff;
			border-radius: 50%;
			animation: party-spin 0.8s linear infinite;
		}

		@keyframes party-spin {
			to { transform: rotate(360deg); }
		}

		.party-review {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.party-review[hidden] {
			display: none !important;
		}

		.party-compare {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}

		.party-compare-col {
			display: flex;
			flex-direction: column;
			gap: 4px;
			min-width: 0;
		}

		.party-compare-col span {
			font-size: 0.7rem;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.03em;
		}

		.party-compare-frame {
			aspect-ratio: 3 / 4;
			border-radius: 8px;
			overflow: hidden;
			background: #000;
		}

		.party-compare-frame img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.party-review-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.party-review-actions .party-btn {
			flex: 1;
			min-width: 120px;
		}

		.party-review-orientation {
			margin: 0;
			font-size: 0.75rem;
			color: var(--muted);
			line-height: 1.4;
		}

		.party-queue-orient {
			position: absolute;
			top: 3px;
			right: 3px;
			min-width: 14px;
			padding: 1px 3px;
			border-radius: 4px;
			font-size: 0.5rem;
			font-weight: 800;
			text-transform: uppercase;
			background: rgba(0, 0, 0, 0.72);
			color: #fff;
			line-height: 1.2;
		}

		.party-committed {
			margin-top: auto;
			border-top: 1px solid var(--border);
			padding-top: 8px;
		}

		.party-committed summary,
		.party-log summary {
			cursor: pointer;
			font-size: 0.8rem;
			color: var(--muted);
			user-select: none;
		}

		.party-committed-list {
			margin: 8px 0 0;
			padding: 0;
			list-style: none;
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
		}

		.party-committed-thumb {
			width: 48px;
			height: 48px;
			padding: 0;
			border: 2px solid transparent;
			border-radius: 6px;
			overflow: hidden;
			background: var(--surface);
			cursor: pointer;
			opacity: 0.75;
		}

		.party-committed-thumb[data-selected='true'] {
			opacity: 1;
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent);
		}

		.party-committed-thumb img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.party-log-list {
			margin: 8px 0 0;
			padding: 0;
			list-style: none;
			max-height: 100px;
			overflow: auto;
			font-family: ui-monospace, Menlo, monospace;
			font-size: 0.62rem;
			line-height: 1.4;
			color: var(--muted);
		}

		.party-hidden-input {
			position: absolute;
			width: 1px;
			height: 1px;
			opacity: 0;
			pointer-events: none;
		}

		@media (min-width: 769px) {
			body.party-body {
				padding: 24px 16px;
			}

			.party-app {
				min-height: 0;
				border: 1px solid var(--border);
				border-radius: 14px;
			}

			.party-viewfinder {
				max-height: min(55vh, 520px);
			}
		}
	</style>
</head>

<body class="party-body">
	<div class="party-app" id="party-app">
		<header class="party-header">
			<h1>Party Mode <span class="party-badge">POC</span></h1>
			<p>Snap guest photos, queue transforms, review when ready, then send to Google Photos.</p>
		</header>

		<section class="party-capture" aria-label="Take photo">
			<div class="party-field">
				<label for="party-method-select">Camera input</label>
				<select class="party-select" id="party-method-select" aria-label="Camera input method"></select>
			</div>

			<div class="party-viewfinder" id="party-viewfinder">
				<div class="party-viewfinder-placeholder" id="party-viewfinder-placeholder">
					<strong>Ready to shoot</strong>
					<span id="party-viewfinder-hint">Tap Take photo to open the camera.</span>
				</div>
				<video id="party-live-video" playsinline muted autoplay hidden></video>
				<div class="party-viewfinder-status" id="party-viewfinder-status" hidden></div>
			</div>

			<div class="party-capture-actions" id="party-capture-actions">
				<button type="button" class="party-btn party-btn--snap party-btn--primary" id="party-snap-btn">Take photo</button>
				<button type="button" class="party-btn party-btn--ghost" id="party-flip-btn" hidden>Flip</button>
				<button type="button" class="party-btn party-btn--shutter" id="party-shutter-btn" aria-label="Take photo" hidden></button>
			</div>
		</section>

		<section class="party-section" aria-label="Processing queue">
			<div class="party-section-head">
				<h2>Queue</h2>
				<span id="party-queue-summary">Nothing processing</span>
			</div>
			<div class="party-queue-scroll" id="party-queue-list">
				<p class="party-queue-empty" id="party-queue-empty">Snapped photos appear here while the model works.</p>
			</div>
		</section>

		<section class="party-review" id="party-review" hidden>
			<div class="party-section-head">
				<h2>Review</h2>
				<span id="party-review-status"></span>
			</div>
			<p class="party-review-orientation" id="party-review-orientation" hidden></p>
			<div class="party-compare">
				<div class="party-compare-col">
					<span>Original</span>
					<div class="party-compare-frame">
						<img id="party-review-original" alt="Original photo" />
					</div>
				</div>
				<div class="party-compare-col">
					<span>Transformed</span>
					<div class="party-compare-frame">
						<img id="party-review-result" alt="Transformed photo" />
					</div>
				</div>
			</div>
			<div class="party-review-actions">
				<button type="button" class="party-btn party-btn--ghost" id="party-redo-btn">Redo</button>
				<button type="button" class="party-btn party-btn--primary" id="party-commit-btn">Add to Google Photos</button>
			</div>
		</section>

		<details class="party-committed">
			<summary>Sent to Google Photos (<span id="party-committed-count">0</span>)</summary>
			<div class="party-committed-list" id="party-committed-list" role="list"></div>
		</details>

		<details class="party-log">
			<summary>Event log</summary>
			<ul class="party-log-list" id="party-log-list"></ul>
		</details>
	</div>

	<input type="file" class="party-hidden-input" id="party-input-native-env" accept="image/*" capture="environment" />
	<input type="file" class="party-hidden-input" id="party-input-native-user" accept="image/*" capture="user" />
	<input type="file" class="party-hidden-input" id="party-input-native-picker" accept="image/*" />

	<script>
		/**
		 * Party Mode POC — one-page flow. Module-shaped for future split.
		 * Storage: localStorage (queue metadata + JPEG data URLs). No new DB tables.
		 * Transform: mocked delay + canvas stylize. Wire-up target: uploadImageFile + submitCreationWithPending + poll.
		 */
		(function () {
			'use strict';

			const STORAGE_KEY = 'parascene_party_queue_v1';
			const METHOD_STORAGE_KEY = 'parascene_party_capture_method_v1';
			const PARTY_PROMPT = 'Party portrait — warm stylized guest photo for the album';
			const MOCK_PROCESS_MS_MIN = 6000;
			const MOCK_PROCESS_MS_MAX = 14000;
			const MAX_QUEUE_ITEMS = 24;
			const STORED_IMAGE_MAX_EDGE = 960;

			/** @typedef {'processing'|'ready'|'committed'|'failed'} PartyItemStatus */
			/** @typedef {'portrait'|'landscape'|'square'} PartyOrientation */
			/** @typedef {{ dataUrl: string, width: number, height: number, orientation: PartyOrientation, aspectRatio: string, exifCorrected: boolean, screenOrientation?: string|null, captureSource?: string, viewportCorrected?: boolean, holdSource?: string }} PartyStoredPhoto */
			/** @typedef {{ id: string, status: PartyItemStatus, createdAt: string, updatedAt: string, prompt: string, originalDataUrl: string, resultDataUrl?: string, error?: string, creationId?: number, width?: number, height?: number, orientation?: PartyOrientation, aspectRatio?: string, exifCorrected?: boolean, screenOrientation?: string|null }} PartyQueueItem */
			/** @typedef {{ id: string, friendlyName: string, hint: string, kind: 'native'|'live', inputId?: string, facing?: 'environment'|'user', default?: boolean }} CaptureMethodDef */

			const CAPTURE_METHODS = /** @type {CaptureMethodDef[]} */ ([
				{
					id: 'native-picker',
					friendlyName: 'Camera or photo library',
					hint: 'Most reliable — iOS/Android picker with Take Photo option.',
					kind: 'native',
					inputId: 'party-input-native-picker',
					default: true
				},
				{
					id: 'native-env',
					friendlyName: 'Rear camera',
					hint: 'Opens the system camera when supported.',
					kind: 'native',
					inputId: 'party-input-native-env'
				},
				{
					id: 'native-user',
					friendlyName: 'Front camera (selfie)',
					hint: 'Front-facing camera when supported.',
					kind: 'native',
					inputId: 'party-input-native-user'
				},
				{
					id: 'live-gum',
					friendlyName: 'In-app viewfinder',
					hint: 'Live preview in the page — best for rapid consecutive shots on supported devices.',
					kind: 'live',
					facing: 'environment'
				}
			]);

			// --- party/log ---
			const PartyLog = {
				_list: null,
				init(el) { this._list = el; },
				write(msg) {
					console.log('[party]', msg);
					if (!this._list) return;
					const li = document.createElement('li');
					li.textContent = `${new Date().toISOString().slice(11, 19)} ${msg}`;
					this._list.prepend(li);
					while (this._list.children.length > 40) this._list.lastChild?.remove();
				}
			};

			// --- party/storage ---
			const PartyStorage = {
				load() {
					try {
						const raw = localStorage.getItem(STORAGE_KEY);
						if (!raw) return { version: 1, items: [] };
						const data = JSON.parse(raw);
						if (!data || data.version !== 1 || !Array.isArray(data.items)) return { version: 1, items: [] };
						return data;
					} catch {
						return { version: 1, items: [] };
					}
				},
				save(data) {
					try {
						localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
					} catch (err) {
						PartyLog.write(`Storage save failed: ${err?.message || err}`);
					}
				},
				loadMethodId() {
					try {
						return localStorage.getItem(METHOD_STORAGE_KEY) || '';
					} catch {
						return '';
					}
				},
				saveMethodId(id) {
					try {
						localStorage.setItem(METHOD_STORAGE_KEY, id);
					} catch (_) { /* ignore */ }
				}
			};

			// --- party/page ---
			const PartyPage = {
				_portraitLockTried: false,
				/** Best-effort: keep the page in portrait (works best when installed as PWA). */
				tryLockPortrait() {
					if (this._portraitLockTried) return;
					this._portraitLockTried = true;
					const lock = screen.orientation?.lock;
					if (typeof lock !== 'function') return;
					lock.call(screen.orientation, 'portrait').then(() => {
						PartyLog.write('Page orientation locked to portrait');
					}).catch(() => {
						PartyLog.write('Could not lock page orientation (browser may ignore when rotation is off)');
					});
				},
				bindPortraitLock() {
					const root = document.getElementById('party-app');
					if (!root) return;
					const once = () => {
						this.tryLockPortrait();
						root.removeEventListener('pointerdown', once);
					};
					root.addEventListener('pointerdown', once, { passive: true });
				}
			};

			// --- party/motion (gyro — works when system rotation lock is on) ---
			const PartyMotion = {
				_beta: null,
				_gamma: null,
				_handler: null,
				_listening: false,
				start() {
					if (this._listening || typeof window === 'undefined') return;
					if (!('DeviceOrientationEvent' in window)) return;
					this._handler = (e) => {
						if (e.beta != null) this._beta = e.beta;
						if (e.gamma != null) this._gamma = e.gamma;
					};
					window.addEventListener('deviceorientation', this._handler, true);
					this._listening = true;
				},
				stop() {
					if (!this._listening || !this._handler) return;
					window.removeEventListener('deviceorientation', this._handler, true);
					this._handler = null;
					this._listening = false;
				},
				/** @returns {PartyOrientation|null} */
				getHoldOrientation() {
					const beta = this._beta;
					const gamma = this._gamma;
					if (beta == null || gamma == null) return null;
					const absGamma = Math.abs(gamma);
					if (absGamma < 45) return 'portrait';
					if (absGamma > 55) return 'landscape';
					return null;
				},
				/**
				 * Sample how the user is holding the phone at shutter time.
				 * @returns {Promise<{ orientation: PartyOrientation, source: string, gamma: number|null }>}
				 */
				sampleHoldOrientation() {
					const cached = this.getHoldOrientation();
					if (cached) {
						return Promise.resolve({
							orientation: cached,
							source: 'gyro',
							gamma: this._gamma
						});
					}
					if (!('DeviceOrientationEvent' in window)) {
						return Promise.resolve({
							orientation: PartyImages.getLayoutOrientation(),
							source: 'layout',
							gamma: null
						});
					}
					return new Promise((resolve) => {
						let settled = false;
						const finish = (orientation, source, gamma) => {
							if (settled) return;
							settled = true;
							clearTimeout(timer);
							window.removeEventListener('deviceorientation', onMotion, true);
							resolve({ orientation, source, gamma });
						};
						const onMotion = (e) => {
							if (e.beta != null) this._beta = e.beta;
							if (e.gamma != null) this._gamma = e.gamma;
							const hold = this.getHoldOrientation();
							if (hold) finish(hold, 'gyro', this._gamma);
						};
						const timer = window.setTimeout(() => {
							finish(PartyImages.getLayoutOrientation(), 'layout', this._gamma);
						}, 120);
						window.addEventListener('deviceorientation', onMotion, true);
					});
				}
			};

			// --- party/images ---
			const PartyImages = {
				/** Locked portrait UI / narrow viewport — not how the user is holding the phone. */
				getLayoutOrientation() {
					return window.innerHeight >= window.innerWidth ? 'portrait' : 'landscape';
				},
				/** Screen orientation API (misleading when system rotation lock is on). */
				getViewportOrientation() {
					const type = String(screen.orientation?.type || '');
					if (type.includes('portrait')) return 'portrait';
					if (type.includes('landscape')) return 'landscape';
					if (screen.orientation?.angle != null) {
						const a = ((Number(screen.orientation.angle) % 360) + 360) % 360;
						return a === 90 || a === 270 ? 'landscape' : 'portrait';
					}
					if (typeof window.orientation === 'number' && window.orientation !== 0) {
						return Math.abs(window.orientation) === 90 ? 'landscape' : 'portrait';
					}
					return this.getLayoutOrientation();
				},
				/** @param {number} width @param {number} height @returns {PartyOrientation} */
				classifyOrientation(width, height) {
					const ratio = width / height;
					if (ratio > 1.05) return 'landscape';
					if (ratio < 0.95) return 'portrait';
					return 'square';
				},
				/** Closest create-style aspect_ratio for provider submit */
				suggestAspectRatio(width, height) {
					const o = this.classifyOrientation(width, height);
					if (o === 'square') return '1:1';
					if (o === 'portrait') return height / width >= 1.55 ? '9:16' : '4:5';
					return width / height >= 1.55 ? '16:9' : '4:5';
				},
				orientationShortLabel(orientation) {
					if (orientation === 'landscape') return 'L';
					if (orientation === 'portrait') return 'P';
					if (orientation === 'square') return 'S';
					return '?';
				},
				formatOrientationDetail(item) {
					if (!item?.orientation) return '';
					const name = item.orientation.charAt(0).toUpperCase() + item.orientation.slice(1);
					const dims = item.width && item.height ? `${item.width}×${item.height}` : '';
					const ar = item.aspectRatio ? `Suggested transform ratio: ${item.aspectRatio}` : '';
					const exif = item.exifCorrected === false ? ' (raw file pixels — EXIF may differ)' : '';
					const live = item.captureSource === 'live-viewfinder'
						? (item.viewportCorrected ? ' (rotated to match hold)' : ' (live capture)')
						: '';
					const hold = item.holdSource ? ` · hold: ${item.holdSource}` : '';
					const screen = item.screenOrientation ? ` · screen ${item.screenOrientation}` : '';
					return [name + exif + live + hold + screen, dims, ar].filter(Boolean).join(' · ');
				},
				/**
				 * getUserMedia frames are often landscape in pixel data while the phone is portrait.
				 * Rotate into canvas so stored image + orientation match physical hold (gyro when available).
				 * @param {HTMLVideoElement} video
				 * @param {{ orientation: PartyOrientation, source: string, gamma?: number|null }} hold
				 */
				drawVideoFrameToCanvas(video, hold) {
					const vw = video.videoWidth;
					const vh = video.videoHeight;
					if (!vw || !vh) throw new Error('No video frame');
					const physical = hold.orientation;
					const gamma = hold.gamma ?? PartyMotion._gamma;
					const bufferLandscape = vw > vh * 1.05;
					const bufferPortrait = vh > vw * 1.05;
					const mismatch =
						(physical === 'portrait' && bufferLandscape) ||
						(physical === 'landscape' && bufferPortrait);
					const canvas = document.createElement('canvas');
					const ctx = canvas.getContext('2d');
					if (!ctx) throw new Error('Canvas unavailable');
					if (!mismatch) {
						canvas.width = vw;
						canvas.height = vh;
						ctx.drawImage(video, 0, 0, vw, vh);
						return { canvas, viewportCorrected: false, holdSource: hold.source };
					}
					canvas.width = vh;
					canvas.height = vw;
					const portraitCcw = gamma != null && gamma > 0;
					if (physical === 'portrait') {
						if (portraitCcw) {
							ctx.translate(0, canvas.height);
							ctx.rotate(-Math.PI / 2);
						} else {
							ctx.translate(canvas.width, 0);
							ctx.rotate(Math.PI / 2);
						}
					} else if (portraitCcw) {
						ctx.translate(canvas.width, 0);
						ctx.rotate(Math.PI / 2);
					} else {
						ctx.translate(0, canvas.height);
						ctx.rotate(-Math.PI / 2);
					}
					ctx.drawImage(video, 0, 0, vw, vh);
					return { canvas, viewportCorrected: true, holdSource: hold.source };
				},
				async canvasToJpegBlob(canvas, quality = 0.9) {
					const blob = await new Promise((resolve) => {
						canvas.toBlob((b) => resolve(b), 'image/jpeg', quality);
					});
					if (!blob) throw new Error('Could not encode photo');
					return blob;
				},
				/** Decode with EXIF orientation applied when the browser supports it */
				async _decodeSource(file) {
					if (typeof createImageBitmap === 'function') {
						try {
							const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
							return { drawable: bitmap, width: bitmap.width, height: bitmap.height, exifCorrected: true, close: () => bitmap.close() };
						} catch (_) { /* fall through */ }
					}
					const url = URL.createObjectURL(file);
					try {
						const img = await this._loadImage(url);
						return {
							drawable: img,
							width: img.naturalWidth,
							height: img.naturalHeight,
							exifCorrected: false,
							close: () => URL.revokeObjectURL(url)
						};
					} catch (err) {
						URL.revokeObjectURL(url);
						throw err;
					}
				},
				_drawToCanvas(drawable, width, height) {
					const canvas = document.createElement('canvas');
					canvas.width = width;
					canvas.height = height;
					const ctx = canvas.getContext('2d');
					if (!ctx) throw new Error('Canvas unavailable');
					ctx.drawImage(drawable, 0, 0, width, height);
					return canvas;
				},
				/** @param {File|Blob} file @param {{ captureSource?: string, viewportCorrected?: boolean, holdSource?: string }} [meta] @returns {Promise<PartyStoredPhoto>} */
				async preparePhoto(file, meta = {}, maxEdge = STORED_IMAGE_MAX_EDGE) {
					if (!String(file.type || '').startsWith('image/')) {
						throw new Error('Only images are supported in Party Mode');
					}
					const decoded = await this._decodeSource(file);
					try {
						const scale = Math.min(1, maxEdge / Math.max(decoded.width, decoded.height));
						const w = Math.max(1, Math.round(decoded.width * scale));
						const h = Math.max(1, Math.round(decoded.height * scale));
						const canvas = this._drawToCanvas(decoded.drawable, w, h);
						const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
						const orientation = this.classifyOrientation(w, h);
						const screenOrientation = typeof screen !== 'undefined' && screen.orientation?.type
							? screen.orientation.type
							: null;
						return {
							dataUrl,
							width: w,
							height: h,
							orientation,
							aspectRatio: this.suggestAspectRatio(w, h),
							exifCorrected: decoded.exifCorrected,
							screenOrientation,
							captureSource: meta.captureSource,
							viewportCorrected: meta.viewportCorrected === true,
							holdSource: meta.holdSource
						};
					} finally {
						decoded.close();
					}
				},
				/** Backfill orientation for items saved before metadata existed */
				async hydrateItemMeta(item) {
					if (item.orientation && item.width && item.height) return;
					const img = await this._loadImage(item.originalDataUrl);
					item.width = img.naturalWidth;
					item.height = img.naturalHeight;
					item.orientation = this.classifyOrientation(item.width, item.height);
					item.aspectRatio = this.suggestAspectRatio(item.width, item.height);
					if (item.exifCorrected == null) item.exifCorrected = true;
				},
				_loadImage(src) {
					return new Promise((resolve, reject) => {
						const img = new Image();
						img.onload = () => resolve(img);
						img.onerror = () => reject(new Error('Could not load image'));
						img.src = src;
					});
				},
				/** POC “diffusion” — visible stylize until real /api/create is wired */
				async mockTransform(originalDataUrl) {
					const img = await this._loadImage(originalDataUrl);
					const canvas = document.createElement('canvas');
					canvas.width = img.naturalWidth;
					canvas.height = img.naturalHeight;
					const ctx = canvas.getContext('2d');
					ctx.drawImage(img, 0, 0);
					ctx.fillStyle = 'rgba(124, 108, 255, 0.22)';
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.globalCompositeOperation = 'overlay';
					ctx.fillStyle = 'rgba(255, 210, 140, 0.35)';
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.globalCompositeOperation = 'source-over';
					return canvas.toDataURL('image/jpeg', 0.85);
				}
			};

			// --- party/queue ---
			const PartyQueue = {
				/** @type {PartyQueueItem[]} */
				items: [],
				/** @type {string|null} */
				selectedId: null,
				/** @type {Map<string, number>} */
				_timers: new Map(),
				_onChange: null,
				init(onChange) {
					this._onChange = onChange;
					const data = PartyStorage.load();
					this.items = data.items.filter((it) => it && it.id && it.originalDataUrl);
					void this._hydrateAllMeta();
					this._resumeProcessing();
					this._emit();
				},
				async _hydrateAllMeta() {
					let changed = false;
					for (const item of this.items) {
						if (item.orientation && item.width) continue;
						try {
							await PartyImages.hydrateItemMeta(item);
							changed = true;
						} catch (_) { /* ignore */ }
					}
					if (changed) this._persist();
				},
				_emit() {
					if (typeof this._onChange === 'function') this._onChange();
				},
				_resumeProcessing() {
					this.items
						.filter((it) => it.status === 'processing')
						.forEach((it) => this._scheduleMockJob(it.id));
				},
				_scheduleMockJob(id) {
					if (this._timers.has(id)) return;
					const delay = MOCK_PROCESS_MS_MIN + Math.random() * (MOCK_PROCESS_MS_MAX - MOCK_PROCESS_MS_MIN);
					const timer = window.setTimeout(() => this._finishMockJob(id), delay);
					this._timers.set(id, timer);
				},
				async _finishMockJob(id) {
					this._timers.delete(id);
					const item = this.items.find((it) => it.id === id);
					if (!item || item.status !== 'processing') return;
					try {
						item.resultDataUrl = await PartyImages.mockTransform(item.originalDataUrl);
						item.status = 'ready';
						item.updatedAt = new Date().toISOString();
						PartyLog.write(`Transform ready: ${id}`);
					} catch (err) {
						item.status = 'failed';
						item.error = err?.message || 'Transform failed';
						item.updatedAt = new Date().toISOString();
						PartyLog.write(`Transform failed: ${id}`);
					}
					this._persist();
					this._emit();
				},
				_persist() {
					const active = this.items
						.filter((it) => it.status !== 'committed')
						.slice(-MAX_QUEUE_ITEMS);
					const committed = this.items.filter((it) => it.status === 'committed').slice(-12);
					this.items = [...active, ...committed];
					PartyStorage.save({ version: 1, items: this.items });
				},
				_newId() {
					return `pty_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
				},
				/** @param {PartyStoredPhoto} photo */
				enqueue(photo) {
					/** @type {PartyQueueItem} */
					const item = {
						id: this._newId(),
						status: 'processing',
						createdAt: new Date().toISOString(),
						updatedAt: new Date().toISOString(),
						prompt: PARTY_PROMPT,
						originalDataUrl: photo.dataUrl,
						width: photo.width,
						height: photo.height,
						orientation: photo.orientation,
						aspectRatio: photo.aspectRatio,
						exifCorrected: photo.exifCorrected,
						screenOrientation: photo.screenOrientation ?? null,
						captureSource: photo.captureSource,
						viewportCorrected: photo.viewportCorrected === true,
						holdSource: photo.holdSource
					};
					this.items.unshift(item);
					this.selectedId = null;
					this._persist();
					this._scheduleMockJob(item.id);
					this._emit();
					PartyLog.write(`Queued: ${item.id}`);
					return item;
				},
				select(id) {
					const item = this.items.find((it) => {
						return it.id === id && (it.status === 'ready' || it.status === 'committed');
					});
					if (!item) return null;
					this.selectedId = id;
					this._emit();
					return item;
				},
				selectedItem() {
					if (!this.selectedId) return null;
					return this.items.find((it) => it.id === this.selectedId) || null;
				},
				clearSelection() {
					this.selectedId = null;
					this._emit();
				},
				redo(id) {
					const idx = this.items.findIndex((it) => it.id === id);
					if (idx === -1) return;
					const item = this.items[idx];
					const timer = this._timers.get(id);
					if (timer) {
						clearTimeout(timer);
						this._timers.delete(id);
					}
					item.status = 'processing';
					item.resultDataUrl = undefined;
					item.error = undefined;
					item.updatedAt = new Date().toISOString();
					if (idx > 0) {
						this.items.splice(idx, 1);
						this.items.unshift(item);
					}
					this.selectedId = null;
					this._persist();
					this._scheduleMockJob(id);
					this._emit();
					PartyLog.write(`Redo queued: ${id}`);
				},
				commit(id) {
					const item = this.items.find((it) => it.id === id);
					if (!item || item.status !== 'ready') return false;
					item.status = 'committed';
					item.updatedAt = new Date().toISOString();
					if (this.selectedId === id) this.selectedId = null;
					this._persist();
					this._emit();
					PartyLog.write(`Committed: ${id}`);
					return true;
				},
				activeItems() {
					return this.items.filter((it) => it.status !== 'committed');
				},
				committedItems() {
					return this.items.filter((it) => it.status === 'committed');
				},
				processingCount() {
					return this.items.filter((it) => it.status === 'processing').length;
				},
				readyCount() {
					return this.items.filter((it) => it.status === 'ready').length;
				}
			};

			// --- party/audio (Web Audio — no sound files) ---
			const PartyAudio = {
				_audioCtx: null,
				getAudioContext() {
					const Ctx = window.AudioContext || window.webkitAudioContext;
					if (!Ctx) return null;
					if (!this._audioCtx) this._audioCtx = new Ctx();
					return this._audioCtx;
				},
				async _ready() {
					const ctx = this.getAudioContext();
					if (!ctx) return null;
					if (ctx.state === 'suspended') {
						try {
							await ctx.resume();
						} catch (_) {
							return null;
						}
					}
					return ctx;
				},
				/** Short synthetic shutter click (noise burst + click) */
				async playShutter() {
					const ctx = await this._ready();
					if (!ctx) return;
					const now = ctx.currentTime;
					const peak = 0.35;

					const clickOsc = ctx.createOscillator();
					const clickGain = ctx.createGain();
					clickOsc.type = 'square';
					clickOsc.frequency.setValueAtTime(1800, now);
					clickOsc.frequency.exponentialRampToValueAtTime(400, now + 0.02);
					clickGain.gain.setValueAtTime(peak * 0.5, now);
					clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
					clickOsc.connect(clickGain);
					clickGain.connect(ctx.destination);
					clickOsc.start(now);
					clickOsc.stop(now + 0.05);

					const duration = 0.06;
					const bufferSize = Math.ceil(ctx.sampleRate * duration);
					const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
					const data = buffer.getChannelData(0);
					for (let i = 0; i < bufferSize; i++) {
						const t = i / bufferSize;
						data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 14);
					}
					const noise = ctx.createBufferSource();
					noise.buffer = buffer;
					const filter = ctx.createBiquadFilter();
					filter.type = 'bandpass';
					filter.frequency.value = 2200;
					filter.Q.value = 0.6;
					const noiseGain = ctx.createGain();
					noiseGain.gain.setValueAtTime(peak, now);
					noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
					noise.connect(filter);
					filter.connect(noiseGain);
					noiseGain.connect(ctx.destination);
					noise.start(now);
					noise.stop(now + duration);
				}
			};

			// --- party/capture ---
			const PartyCapture = {
				/** @type {CaptureMethodDef|null} */
				method: null,
				/** @type {MediaStream|null} */
				stream: null,
				facing: 'environment',
				/** @type {Record<string, HTMLInputElement>} */
				inputs: {},
				els: {},
				_onSnap: null,
				init(els, onSnap) {
					this.els = els;
					this._onSnap = onSnap;
					CAPTURE_METHODS.forEach((m) => {
						if (m.inputId) this.inputs[m.id] = document.getElementById(m.inputId);
					});
					Object.values(this.inputs).forEach((input) => {
						input?.addEventListener('change', () => this._onNativeChange(input));
					});
					els.snapBtn?.addEventListener('click', () => this.onSnapPressed());
					els.shutterBtn?.addEventListener('click', () => this.onLiveShutter());
					els.flipBtn?.addEventListener('click', () => this.flipLive());
				},
				getMethod(id) {
					return CAPTURE_METHODS.find((m) => m.id === id) || CAPTURE_METHODS.find((m) => m.default) || CAPTURE_METHODS[0];
				},
				/** @param {CaptureMethodDef} method */
				async setMethod(method) {
					this.method = method;
					PartyStorage.saveMethodId(method.id);
					const isLive = method.kind === 'live';
					this.els.actions?.classList.toggle('party-capture-actions--live', isLive);
					this.els.flipBtn.hidden = !isLive;
					this.els.placeholder.hidden = isLive;
					this.els.liveVideo.hidden = !isLive;
					this.els.status.hidden = !isLive;
					if (this.els.hint) {
						this.els.hint.textContent = isLive
							? 'Use the shutter below. You can snap several shots — each joins the queue.'
							: method.hint;
					}
					if (isLive) {
						PartyMotion.start();
						await this.startLive();
					} else {
						await this.stopLive();
						PartyMotion.stop();
					}
				},
				async onSnapPressed() {
					if (!this.method) return;
					if (this.method.kind === 'live') return;
					const input = this.inputs[this.method.id];
					if (!input) return;
					input.value = '';
					input.click();
				},
				async _onNativeChange(input) {
					const file = input.files?.[0];
					if (!file) return;
					try {
						const photo = await PartyImages.preparePhoto(file);
						if (typeof this._onSnap === 'function') this._onSnap(photo);
					} catch (err) {
						PartyLog.write(`Capture failed: ${err?.message || err}`);
					}
				},
				async onLiveShutter() {
					PartyPage.tryLockPortrait();
					void PartyAudio.playShutter();
					const video = this.els.liveVideo;
					if (!video?.videoWidth) return;
					try {
						const hold = await PartyMotion.sampleHoldOrientation();
						const { canvas, viewportCorrected, holdSource } = PartyImages.drawVideoFrameToCanvas(video, hold);
						const blob = await PartyImages.canvasToJpegBlob(canvas, 0.9);
						const photo = await PartyImages.preparePhoto(blob, {
							captureSource: 'live-viewfinder',
							viewportCorrected,
							holdSource: holdSource || hold.source
						});
						if (typeof this._onSnap === 'function') this._onSnap(photo);
					} catch (err) {
						PartyLog.write(`Shutter failed: ${err?.message || err}`);
					}
				},
				async startLive() {
					await this.stopLive();
					if (!navigator.mediaDevices?.getUserMedia) {
						this._setStatus('Camera API unavailable');
						return;
					}
					this.facing = this.method?.facing || 'environment';
					this._setStatus('Starting camera…');
					try {
						const stream = await navigator.mediaDevices.getUserMedia({
							audio: false,
							video: { facingMode: this.facing, width: { ideal: 1280 }, height: { ideal: 720 } }
						});
						this.stream = stream;
						this.els.liveVideo.srcObject = stream;
						await this.els.liveVideo.play().catch(() => {});
						this._setStatus(`Live — ${this.facing}`);
					} catch (err) {
						this._setStatus(err?.message || 'Camera blocked');
						PartyLog.write(`getUserMedia: ${err?.message || err}`);
					}
				},
				async stopLive() {
					if (this.stream) {
						this.stream.getTracks().forEach((t) => t.stop());
						this.stream = null;
					}
					if (this.els.liveVideo) this.els.liveVideo.srcObject = null;
					PartyMotion.stop();
					this._setStatus('');
				},
				async flipLive() {
					this.facing = this.facing === 'environment' ? 'user' : 'environment';
					await this.startLive();
				},
				_setStatus(text) {
					if (!this.els.status) return;
					this.els.status.hidden = !text;
					this.els.status.textContent = text;
				}
			};

			// --- party/ui ---
			const PartyUI = {
				els: {},
				init(els) {
					this.els = els;
					els.redoBtn?.addEventListener('click', () => PartyApp.onRedo());
					els.commitBtn?.addEventListener('click', () => PartyApp.onCommit());
				},
				renderMethodSelect(selectedId, onChange) {
					const sel = this.els.methodSelect;
					if (!sel) return;
					sel.replaceChildren();
					CAPTURE_METHODS.forEach((m) => {
						const opt = document.createElement('option');
						opt.value = m.id;
						opt.textContent = m.friendlyName;
						sel.appendChild(opt);
					});
					sel.value = selectedId;
					sel.addEventListener('change', () => onChange(sel.value));
				},
				renderQueue() {
					const list = this.els.queueList;
					const empty = this.els.queueEmpty;
					if (!list) return;
					const active = PartyQueue.activeItems();
					const processing = PartyQueue.processingCount();
					const ready = PartyQueue.readyCount();
					if (this.els.queueSummary) {
						if (!active.length) {
							this.els.queueSummary.textContent = 'Nothing processing';
						} else if (processing && ready) {
							this.els.queueSummary.textContent = `${processing} processing · ${ready} ready`;
						} else if (processing) {
							this.els.queueSummary.textContent = `${processing} processing`;
						} else {
							this.els.queueSummary.textContent = `${ready} ready to review`;
						}
					}
					list.querySelectorAll('.party-queue-item').forEach((n) => n.remove());
					if (!active.length) {
						empty.hidden = false;
						return;
					}
					empty.hidden = true;
					active.forEach((item) => {
						const btn = document.createElement('button');
						btn.type = 'button';
						btn.className = 'party-queue-item';
						btn.dataset.status = item.status;
						btn.dataset.itemId = item.id;
						if (PartyQueue.selectedId === item.id) btn.dataset.selected = 'true';
						const img = document.createElement('img');
						img.src = item.originalDataUrl;
						img.alt = '';
						btn.appendChild(img);
						if (item.orientation) {
							const orient = document.createElement('span');
							orient.className = 'party-queue-orient';
							orient.textContent = PartyImages.orientationShortLabel(item.orientation);
							orient.title = PartyImages.formatOrientationDetail(item);
							btn.appendChild(orient);
						}
						const badge = document.createElement('span');
						badge.className = 'party-queue-item-badge';
						badge.textContent = item.status === 'processing' ? 'Working' : item.status === 'ready' ? 'Ready' : item.status;
						btn.appendChild(badge);
						if (item.status === 'processing') {
							const spin = document.createElement('div');
							spin.className = 'party-queue-spinner';
							spin.setAttribute('aria-hidden', 'true');
							btn.appendChild(spin);
						}
						btn.addEventListener('click', () => {
							if (item.status === 'ready') PartyApp.openReview(item.id);
							else if (item.status === 'failed') {
								PartyQueue.redo(item.id);
								PartyUI.renderAll();
							}
						});
						list.appendChild(btn);
					});
				},
				renderReview() {
					const panel = this.els.review;
					if (!panel) return;
					const item = PartyQueue.selectedItem();
					if (!item || (item.status !== 'ready' && item.status !== 'committed')) {
						panel.hidden = true;
						if (this.els.redoBtn) this.els.redoBtn.hidden = false;
						if (this.els.commitBtn) this.els.commitBtn.hidden = false;
						if (this.els.reviewOrientation) this.els.reviewOrientation.hidden = true;
						return;
					}
					const isCommitted = item.status === 'committed';
					panel.hidden = false;
					if (this.els.reviewOriginal) this.els.reviewOriginal.src = item.originalDataUrl;
					if (this.els.reviewResult) this.els.reviewResult.src = item.resultDataUrl || '';
					if (this.els.reviewStatus) {
						this.els.reviewStatus.textContent = isCommitted
							? 'Sent to Google Photos'
							: 'Ready — keep or redo';
					}
					if (this.els.reviewOrientation) {
						const detail = PartyImages.formatOrientationDetail(item);
						if (detail) {
							this.els.reviewOrientation.hidden = false;
							this.els.reviewOrientation.textContent = detail;
						} else {
							this.els.reviewOrientation.hidden = true;
							this.els.reviewOrientation.textContent = '';
						}
					}
					if (this.els.redoBtn) {
						this.els.redoBtn.hidden = false;
						this.els.redoBtn.textContent = isCommitted ? 'Re-transform' : 'Redo';
					}
					if (this.els.commitBtn) {
						this.els.commitBtn.hidden = isCommitted;
					}
				},
				renderCommitted() {
					const committed = PartyQueue.committedItems();
					if (this.els.committedCount) {
						this.els.committedCount.textContent = String(committed.length);
					}
					const list = this.els.committedList;
					if (!list) return;
					list.replaceChildren();
					committed.slice().reverse().forEach((item) => {
						const btn = document.createElement('button');
						btn.type = 'button';
						btn.className = 'party-committed-thumb';
						btn.dataset.itemId = item.id;
						btn.setAttribute('aria-label', 'Review sent photo');
						if (PartyQueue.selectedId === item.id) btn.dataset.selected = 'true';
						const img = document.createElement('img');
						img.src = item.resultDataUrl || item.originalDataUrl;
						img.alt = '';
						btn.appendChild(img);
						btn.setAttribute('role', 'listitem');
						btn.addEventListener('click', () => PartyApp.openReview(item.id, { fromCommitted: true }));
						list.appendChild(btn);
					});
				},
				renderAll() {
					this.renderQueue();
					this.renderReview();
					this.renderCommitted();
				}
			};

			// --- party/app ---
			const PartyApp = {
				init() {
					PartyPage.bindPortraitLock();
					PartyLog.init(document.getElementById('party-log-list'));
					const els = {
						methodSelect: document.getElementById('party-method-select'),
						viewfinder: document.getElementById('party-viewfinder'),
						placeholder: document.getElementById('party-viewfinder-placeholder'),
						hint: document.getElementById('party-viewfinder-hint'),
						liveVideo: document.getElementById('party-live-video'),
						status: document.getElementById('party-viewfinder-status'),
						actions: document.getElementById('party-capture-actions'),
						snapBtn: document.getElementById('party-snap-btn'),
						shutterBtn: document.getElementById('party-shutter-btn'),
						flipBtn: document.getElementById('party-flip-btn'),
						queueList: document.getElementById('party-queue-list'),
						queueEmpty: document.getElementById('party-queue-empty'),
						queueSummary: document.getElementById('party-queue-summary'),
						review: document.getElementById('party-review'),
						reviewOriginal: document.getElementById('party-review-original'),
						reviewResult: document.getElementById('party-review-result'),
						reviewStatus: document.getElementById('party-review-status'),
						reviewOrientation: document.getElementById('party-review-orientation'),
						redoBtn: document.getElementById('party-redo-btn'),
						commitBtn: document.getElementById('party-commit-btn'),
						committedCount: document.getElementById('party-committed-count'),
						committedList: document.getElementById('party-committed-list'),
						committedDetails: document.querySelector('.party-committed')
					};
					PartyUI.init(els);
					PartyCapture.init(els, (dataUrl) => this.onPhotoCaptured(dataUrl));
					PartyQueue.init(() => PartyUI.renderAll());

					const savedMethod = PartyStorage.loadMethodId();
					const method = PartyCapture.getMethod(savedMethod);
					PartyUI.renderMethodSelect(method.id, (id) => {
						PartyCapture.setMethod(PartyCapture.getMethod(id));
					});
					PartyCapture.setMethod(method);
					PartyUI.renderAll();
					PartyLog.write('Party Mode ready');
				},
				onPhotoCaptured(photo) {
					PartyLog.write(`Snap ${photo.orientation} ${photo.width}×${photo.height} → ${photo.aspectRatio}`);
					PartyQueue.enqueue(photo);
					PartyUI.renderAll();
				},
				openReview(id, opts = {}) {
					const item = PartyQueue.select(id);
					if (!item) return;
					if (opts.fromCommitted && PartyUI.els.committedDetails) {
						PartyUI.els.committedDetails.open = true;
					}
					PartyUI.renderAll();
					PartyUI.els.review?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				},
				onRedo() {
					const id = PartyQueue.selectedId;
					if (!id) return;
					PartyQueue.redo(id);
					PartyUI.renderAll();
					PartyUI.els.queueList?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				},
				onCommit() {
					const id = PartyQueue.selectedId;
					if (!id) return;
					const ok = PartyQueue.commit(id);
					if (!ok) return;
					window.alert('POC: This would add the transformed photo to your Google Photos album.');
					PartyUI.renderAll();
				}
			};

			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', () => PartyApp.init());
			} else {
				PartyApp.init();
			}
		})();
	</script>
</body>

</html>
